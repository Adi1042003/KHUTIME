<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Hendati ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* PHOTO BACKGROUND */

.photo-bg{
position:absolute;
inset:0;
overflow:hidden;
z-index:1;
}

.floating-photo{
position:absolute;
width:180px;
height:180px;
object-fit:cover;
border-radius:25px;
border:4px solid rgba(255,255,255,.8);
box-shadow:0 0 25px rgba(255,255,255,.6);
animation:floatPhoto linear infinite;
opacity:.9;
}

.floating-photo:nth-child(1){
left:3%;
animation-duration:18s;
}

.floating-photo:nth-child(2){
left:18%;
animation-duration:20s;
}

.floating-photo:nth-child(3){
left:35%;
animation-duration:17s;
}

.floating-photo:nth-child(4){
left:52%;
animation-duration:22s;
}

.floating-photo:nth-child(5){
left:70%;
animation-duration:19s;
}

.floating-photo:nth-child(6){
left:85%;
animation-duration:21s;
}

@keyframes floatPhoto{
0%{
transform:translateY(120vh) rotate(-10deg);
}
100%{
transform:translateY(-250px) rotate(10deg);
}
}

/* HEARTS */

.heart{
position:absolute;
font-size:25px;
animation:heartFloat 8s linear infinite;
opacity:.8;
pointer-events:none;
z-index:2;
}

@keyframes heartFloat{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

/* LOGIN CARD */

.login-card{
position:relative;
z-index:10;
width:400px;
max-width:90%;
padding:35px;
text-align:center;

background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);

border-radius:25px;
border:1px solid rgba(255,255,255,.3);

box-shadow:0 8px 32px rgba(0,0,0,.2);
}

.login-card h1{
color:white;
font-size:2rem;
margin-bottom:10px;
}

.login-card p{
color:white;
margin-bottom:20px;
}

.quote{
color:white;
min-height:50px;
font-style:italic;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:#ff4d6d;
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#message{
margin-top:15px;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<!-- PHOTOS -->

<div class="photo-bg">

<img src="pic1.jpeg" class="floating-photo">
<img src="pic2.jpeg" class="floating-photo">
<img src="pic3.jpeg" class="floating-photo">
<img src="pic4.jpeg" class="floating-photo">
<img src="pic5.jpeg" class="floating-photo">
<img src="pic6.jpeg" class="floating-photo">

</div>

<!-- LOGIN CARD -->

<div class="login-card">

<h1>❤️ Vidyashree ❤️</h1>

<p>
Every beautiful love story begins with a secret...
</p>

<div id="quote" class="quote"></div>

<input
type="password"
id="password"
placeholder="Enter Secret Password ❤️">

<button onclick="login()">
Unlock My Heart ❤️
</button>

<div id="message"></div>

</div>

<script>

/* PASSWORD */

const PASSWORD = "I Love You Hendati";

/* QUOTES */

const quotes = [

"You are my favorite notification ❤️",
"My world became beautiful because of you 🌹",
"You are my today and all my tomorrows 💕",
"Every heartbeat whispers your name ❤️",
"Forever starts with us 💖",
"You're my happiest chapter 🌹",
"I Love You Hendati ❤️",
"You're my safe place 💕"

];

let q=0;

function rotateQuotes(){

document.getElementById("quote").innerHTML=
quotes[q];

q=(q+1)%quotes.length;
}

rotateQuotes();
setInterval(rotateQuotes,3000);

/* HEARTS */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=
["❤️","💕","💖","💘","💝"]
[Math.floor(Math.random()*5)];

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(Math.random()*20+20)+"px";

heart.style.animationDuration=
(Math.random()*5+5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,300);

/* LOGIN */

function login(){

const pass=
document.getElementById("password").value;

const msg=
document.getElementById("message");

if(pass===PASSWORD){

msg.innerHTML=
"💖 Welcome My Love... Loading Surprise 💖";

setTimeout(()=>{

window.location.href=
"https://adi1042003.github.io/Ganu/GanuWifeBday.html";

},2000);

}else{

const errors=[

"🌹 Wrong password my love...",
"💕 Try again sweetheart...",
"❤️ Think about our special nickname...",
"💖 Not this one..."

];

msg.innerHTML=
errors[Math.floor(Math.random()*errors.length)];

}
}

/* ENTER KEY */

document
.getElementById("password")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
